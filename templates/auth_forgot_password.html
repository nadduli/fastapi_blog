<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Daniel Hotspot Admin</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <!-- Custom Auth Styles -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="ri-key-2-line"></i>
                <h2>Reset Password</h2>
            </div>
            <p class="auth-subtitle">Enter your email and we'll send you a link to reset your password.</p>
        </div>

        <form action="/auth/forgot-password" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="form-input-wrapper">
                    <input type="email" id="email" name="email" class="form-input" placeholder="admin@danielhotspot.com" required>
                    <i class="ri-mail-line"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            Remembered your password? <a href="/auth/login">Back to Login</a>
        </div>
    </div>
</body>
</html>
