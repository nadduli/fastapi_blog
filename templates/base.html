<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Daniel Hotspot{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}" />
  {% block head %}{% endblock %}
</head>

<body>
  <nav>
    <div class="logo">
      <span></span> Daniel Hotspot
    </div>
    <div class="nav-hint">🔒 Secure Hotspot Portal</div>
  </nav>

  <main>

    {% block content %}{% endblock %}
  </main>

  <footer>
    &copy; {{ request.state.current_year }} Daniel Hotspot &bull; Powered by Daniel WiFi &bull; Pay with MTN MoMo &amp;
    Airtel Money
  </footer>

  {% block scripts %}{% endblock %}
</body>

</html>
